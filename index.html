<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Склад — Приёмка</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@400;700;900&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --accent2: #ff6b00;
    --text: #f0f0f0;
    --muted: #555;
    --success: #00ff88;
    --error: #ff3b3b;
    --warn: #ffaa00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    overflow-x: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Unbounded', sans-serif;
    font-weight: 900; font-size: 12px; color: #000;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.05em;
  }

  .header-text p {
    font-size: 9px; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px;
  }

  .main { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 10px; width: 100%; }

  /* Block base */
  .block {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 100%;
    overflow: hidden;
  }

  .block-label {
    padding: 9px 12px;
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }

  .dot { width: 6px; height: 6px; flex-shrink: 0; display: block; }

  /* Scanner */
  #reader { width: 100%; background: #000; }
  #reader video { width: 100% !important; }
  #reader img { display: none !important; }

  .scan-btn {
    width: 100%; padding: 16px;
    background: var(--accent); color: #000; border: none;
    font-family: 'Unbounded', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 0.06em;
    cursor: pointer;
  }

  .scan-btn.stop { background: var(--border); color: var(--muted); }

  /* Status */
  .status-line {
    padding: 10px 12px; font-size: 11px; color: var(--muted);
    text-align: center; display: none; width: 100%;
  }
  .status-line.visible { display: block; }
  .status-line.searching { color: var(--accent); }

  /* Found card */
  .found-card {
    display: none; background: var(--surface);
    border: 1px solid var(--warn); width: 100%;
    animation: fadeIn 0.2s ease;
  }
  .found-card.visible { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

  .found-header {
    padding: 10px 12px; background: #1a1000;
    border-bottom: 1px solid var(--warn);
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--warn);
  }

  .found-info { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

  .found-row { display: flex; flex-direction: column; gap: 3px; }

  .found-key {
    font-size: 9px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  .found-val { font-size: 16px; color: var(--text); font-weight: 700; word-break: break-all; }
  .found-val.article { color: var(--accent); font-family: 'Unbounded', sans-serif; font-size: 15px; }

  .qty-edit {
    border-top: 1px solid var(--border);
    padding: 12px; display: flex; flex-direction: column; gap: 8px;
  }

  .qty-edit-label {
    font-size: 9px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  .qty-row {
    display: flex; gap: 8px; align-items: center; width: 100%;
  }

  .qty-btn {
    width: 52px; height: 52px; flex-shrink: 0;
    background: var(--border); border: none;
    color: var(--text); font-size: 24px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .qty-btn:active { background: #444; }

  .qty-input {
    flex: 1; min-width: 0;
    background: var(--bg); border: 1px solid var(--warn);
    color: var(--warn); font-family: 'Unbounded', sans-serif;
    font-size: 26px; font-weight: 700;
    padding: 8px; text-align: center;
    outline: none; -webkit-appearance: none; border-radius: 0;
    width: 100%;
  }

  .btn-col {
    display: flex; flex-direction: column; gap: 8px;
    padding: 0 12px 12px;
  }

  .btn-update {
    width: 100%; padding: 16px;
    background: var(--warn); color: #000; border: none;
    font-family: 'Unbounded', sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
    cursor: pointer;
  }
  .btn-update:active { background: #cc8800; }

  .btn-new {
    width: 100%; padding: 14px;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border);
    font-family: 'Unbounded', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
    cursor: pointer;
  }
  .btn-new:active { background: var(--border); }

  /* Form */
  .form-block {
    display: none; background: var(--surface);
    border: 1px solid var(--border); width: 100%;
  }
  .form-block.visible { display: block; }

  .fields { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

  .field { display: flex; flex-direction: column; gap: 4px; }

  .field label {
    font-size: 9px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  .field input {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 15px; padding: 12px;
    outline: none; -webkit-appearance: none; border-radius: 0;
    width: 100%;
  }
  .field input:focus { border-color: var(--accent); }
  .field input.filled { color: var(--accent2); }

  .new-qty-row { display: flex; gap: 8px; align-items: center; width: 100%; }
  .new-qty-input {
    flex: 1; min-width: 0;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 20px; font-weight: 700;
    padding: 12px; text-align: center;
    outline: none; -webkit-appearance: none; border-radius: 0;
  }
  .new-qty-input:focus { border-color: var(--accent); }

  .submit-btn {
    width: 100%; padding: 18px;
    background: var(--surface); color: var(--accent);
    border: 1px solid var(--accent);
    font-family: 'Unbounded', sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
    cursor: pointer; margin-top: 4px;
  }
  .submit-btn:active { background: var(--accent); color: #000; }
  .submit-btn:disabled { border-color: var(--border); color: var(--muted); }

  /* Config */
  .config-toggle {
    width: 100%; padding: 10px 12px;
    background: none; border: none; color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    text-align: left; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
  }
  .config-toggle::before { content: '▶'; font-size: 8px; transition: transform 0.2s; }
  .config-toggle.open::before { transform: rotate(90deg); }

  .config-inner { display: none; padding: 12px; border-top: 1px solid var(--border); }
  .config-inner.open { display: block; }
  .config-inner input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 10px; padding: 8px 10px;
    outline: none; border-radius: 0;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; left: 12px; right: 12px;
    padding: 14px; font-size: 12px; letter-spacing: 0.04em;
    display: none; z-index: 100; border-left: 3px solid;
  }
  .toast.success { background: #001a0d; border-color: var(--success); color: var(--success); display: block; }
  .toast.error { background: #1a0000; border-color: var(--error); color: var(--error); display: block; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">VS</div>
  <div class="header-text">
    <h1>VISUVA WAREHOUSE</h1>
    <p>Приёмка товара — MVP</p>
  </div>
</header>

<div class="main">

  <!-- Config -->
  <div class="block">
    <button class="config-toggle" id="configToggle">Настройки</button>
    <div class="config-inner" id="configInner">
      <label style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px">URL Apps Script</label>
      <input type="url" id="scriptUrl" autocomplete="off">
    </div>
  </div>

  <!-- Scanner -->
  <div class="block">
    <div class="block-label"><span class="dot" style="background:var(--accent)"></span>Сканер</div>
    <div id="reader"></div>
    <button class="scan-btn" id="scanBtn">▶ ЗАПУСТИТЬ КАМЕРУ</button>
  </div>

  <!-- Status -->
  <div class="status-line" id="statusLine"></div>

  <!-- Found card -->
  <div class="found-card" id="foundCard">
    <div class="found-header">⚠ Артикул найден в таблице</div>
    <div class="found-info">
      <div class="found-row">
        <span class="found-key">Артикул</span>
        <span class="found-val article" id="fArticle"></span>
      </div>
      <div class="found-row">
        <span class="found-key">Название</span>
        <span class="found-val" id="fName"></span>
      </div>
      <div class="found-row">
        <span class="found-key">Текущее кол-во</span>
        <span class="found-val" id="fQtyCurrent"></span>
      </div>
    </div>
    <div class="qty-edit">
      <div class="qty-edit-label">Новое количество</div>
      <div class="qty-row">
        <button class="qty-btn" id="fMinus">−</button>
        <input type="number" class="qty-input" id="fQty" value="1" min="1">
        <button class="qty-btn" id="fPlus">+</button>
      </div>
    </div>
    <div class="btn-col">
      <button class="btn-update" id="btnUpdate">↑ ОБНОВИТЬ</button>
      <button class="btn-new" id="btnAddNew">+ ДОБАВИТЬ КАК НОВУЮ ЗАПИСЬ</button>
    </div>
  </div>

  <!-- New item form -->
  <div class="form-block" id="formBlock">
    <div class="block-label"><span class="dot" style="background:var(--accent2)"></span>Новый товар</div>
    <div class="fields">
      <div class="field">
        <label>Артикул</label>
        <input type="text" id="article" placeholder="A-001" autocomplete="off">
      </div>
      <div class="field">
        <label>Название</label>
        <input type="text" id="name" placeholder="Наименование" autocomplete="off">
      </div>
      <div class="field">
        <label>Количество</label>
        <div class="new-qty-row">
          <button class="qty-btn" id="qtyMinus">−</button>
          <input type="number" class="new-qty-input" id="qty" value="1" min="1">
          <button class="qty-btn" id="qtyPlus">+</button>
        </div>
      </div>
    </div>
    <div style="padding:0 12px 12px">
      <button class="submit-btn" id="submitBtn">↑ ЗАПИСАТЬ В ТАБЛИЦУ</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_5rTCvqLVBPWVAp1RYoWeJmjbstfvu1yLrJJS8PsnRS0zCHurdiaixBU_mJjwjNfy/exec';

  const scriptUrlInput = document.getElementById('scriptUrl');
  scriptUrlInput.value = localStorage.getItem('scriptUrl') || SCRIPT_URL;

  const configToggle = document.getElementById('configToggle');
  const configInner = document.getElementById('configInner');
  configToggle.addEventListener('click', () => {
    configToggle.classList.toggle('open');
    configInner.classList.toggle('open');
  });
  scriptUrlInput.addEventListener('change', () => localStorage.setItem('scriptUrl', scriptUrlInput.value.trim()));

  function getUrl() { return scriptUrlInput.value.trim() || SCRIPT_URL; }

  let foundRow = null;
  let scanner = null, scanning = false;

  const scanBtn = document.getElementById('scanBtn');
  scanBtn.addEventListener('click', () => scanning ? stopScanner() : startScanner());

  function startScanner() {
    scanner = new Html5Qrcode("reader");
    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 220, height: 160 } },
      onScanSuccess, () => {}
    ).then(() => {
      scanning = true;
      scanBtn.textContent = '■ ОСТАНОВИТЬ';
      scanBtn.classList.add('stop');
    }).catch(err => showToast('Ошибка камеры: ' + err, 'error'));
  }

  function stopScanner() {
    if (scanner) {
      scanner.stop().then(() => {
        scanner.clear(); scanner = null; scanning = false;
        scanBtn.textContent = '▶ ЗАПУСТИТЬ КАМЕРУ';
        scanBtn.classList.remove('stop');
      });
    }
  }

  async function onScanSuccess(decodedText) {
    stopScanner();
    let article = decodedText, name = '';
    if (decodedText.includes('|')) {
      const parts = decodedText.split('|');
      article = parts[0].trim(); name = parts[1].trim();
    }

    showStatus('Ищу ' + article + '...', 'searching');
    hideAll();

    try {
      const res = await fetch(getUrl() + '?article=' + encodeURIComponent(article));
      const data = await res.json();
      hideStatus();

      if (data.found) {
        foundRow = data.row;
        document.getElementById('fArticle').textContent = data.article;
        document.getElementById('fName').textContent = data.name || '—';
        document.getElementById('fQtyCurrent').textContent = data.qty;
        document.getElementById('fQty').value = data.qty;
        document.getElementById('foundCard').classList.add('visible');
      } else {
        document.getElementById('article').value = article;
        document.getElementById('article').classList.add('filled');
        document.getElementById('name').value = name;
        document.getElementById('qty').value = 1;
        document.getElementById('formBlock').classList.add('visible');
        if (!name) document.getElementById('name').focus();
      }
    } catch(err) {
      hideStatus();
      document.getElementById('article').value = article;
      document.getElementById('name').value = name;
      document.getElementById('formBlock').classList.add('visible');
    }
  }

  function hideAll() {
    document.getElementById('foundCard').classList.remove('visible');
    document.getElementById('formBlock').classList.remove('visible');
    foundRow = null;
  }

  function showStatus(msg, cls) {
    const s = document.getElementById('statusLine');
    s.textContent = msg; s.className = 'status-line visible ' + (cls || '');
  }

  function hideStatus() { document.getElementById('statusLine').className = 'status-line'; }

  document.getElementById('fMinus').addEventListener('click', () => {
    const q = document.getElementById('fQty');
    if (Number(q.value) > 1) q.value = Number(q.value) - 1;
  });
  document.getElementById('fPlus').addEventListener('click', () => {
    const q = document.getElementById('fQty');
    q.value = Number(q.value) + 1;
  });

  document.getElementById('btnUpdate').addEventListener('click', async () => {
    const qty = document.getElementById('fQty').value;
    const article = document.getElementById('fArticle').textContent;
    const name = document.getElementById('fName').textContent;
    const btn = document.getElementById('btnUpdate');
    btn.disabled = true; btn.textContent = '...';
    try {
      await fetch(getUrl(), {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ article, name: name === '—' ? '' : name, qty: Number(qty), row: foundRow })
      });
      showToast('✓ Обновлено: ' + article + ' → ' + qty + ' шт.', 'success');
      hideAll();
    } catch(err) {
      showToast('Ошибка: ' + err.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = '↑ ОБНОВИТЬ';
    }
  });

  document.getElementById('btnAddNew').addEventListener('click', () => {
    const article = document.getElementById('fArticle').textContent;
    const name = document.getElementById('fName').textContent;
    const qty = document.getElementById('fQty').value;
    hideAll();
    document.getElementById('article').value = article;
    document.getElementById('name').value = name === '—' ? '' : name;
    document.getElementById('qty').value = qty;
    document.getElementById('formBlock').classList.add('visible');
  });

  document.getElementById('qtyMinus').addEventListener('click', () => {
    const q = document.getElementById('qty');
    if (Number(q.value) > 1) q.value = Number(q.value) - 1;
  });
  document.getElementById('qtyPlus').addEventListener('click', () => {
    const q = document.getElementById('qty');
    q.value = Number(q.value) + 1;
  });

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const article = document.getElementById('article').value.trim();
    const name = document.getElementById('name').value.trim();
    const qty = document.getElementById('qty').value;
    if (!article) { showToast('Артикул не заполнен', 'error'); return; }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '...ОТПРАВКА...';
    try {
      await fetch(getUrl(), {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ article, name, qty: Number(qty) })
      });
      showToast('✓ Записано: ' + article + ' × ' + qty, 'success');
      hideAll();
      document.getElementById('article').value = '';
      document.getElementById('article').classList.remove('filled');
      document.getElementById('name').value = '';
      document.getElementById('qty').value = 1;
    } catch(err) {
      showToast('Ошибка: ' + err.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = '↑ ЗАПИСАТЬ В ТАБЛИЦУ';
    }
  });

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast ' + type;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = 'toast'; }, 3500);
  }
</script>
</body>
</html>
